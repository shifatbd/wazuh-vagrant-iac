services:
  wazuh.manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION}
    hostname: wazuh.manager
    extra_hosts:
      - "wazuh-indexer.wazuh.internal:${WAZUH_INDEXER_IP}"
      - "wazuh-indexer:${WAZUH_INDEXER_IP}"
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh-indexer.wazuh.internal:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=vah1Shaibaa8voh
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - /var/lib/wazuh-manager/api-configuration:/var/ossec/api/configuration
      - /var/lib/wazuh-manager/etc:/var/ossec/etc
      - /var/lib/wazuh-manager/logs:/var/ossec/logs
      - /var/lib/wazuh-manager/queue:/var/ossec/queue
      - /var/lib/wazuh-manager/var-multigroups:/var/ossec/var/multigroups
      - /var/lib/wazuh-manager/integrations:/var/ossec/integrations
      - /var/lib/wazuh-manager/active-response:/var/ossec/active-response/bin
      - /var/lib/wazuh-manager/agentless:/var/ossec/agentless
      - /var/lib/wazuh-manager/wodles:/var/ossec/wodles
      - /var/lib/wazuh-manager/filebeat-etc:/etc/filebeat
      - /var/lib/wazuh-manager/filebeat-var:/var/lib/filebeat
      - ./config/certs/rootCA.pem:/var/ossec/etc/rootCA.pem:ro
      - ./config/certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./config/certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./config/filebeat_module/wazuh/alerts/config/alerts.yml:/usr/share/filebeat/module/wazuh/alerts/config/alerts.yml:ro
      - ./config/filebeat_module/wazuh/archives/config/archives.yml:/usr/share/filebeat/module/wazuh/archives/config/archives.yml:ro
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
